<!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<body>

<div class="w3-container">

  <table class="w3-table-all">
    <thead>
      <tr class="w3-blue">
        <th>Number</th>
        <th>Coins</th>
        <th>Gains</th>
      </tr>
    </thead>
    <tr>
      <td>1</td>
      <td>BTC</td>
      <td><div class="w3-container w3-yellow" style="width:15%">15%</div></td>
    </tr>
    <tr>
      <td>2</td>
      <td>XRP</td>
      <td><div class="w3-container w3-grey" style="width:35%">35%</div></td>
    </tr>
    <tr>
      <td>3</td>
      <td>ETH</td>
      <td><div class="w3-container w3-blue" style="width:5%">5%</div></td>
    </tr>
    <tr>
      <td>4</td>
      <td>HYPE</td>
      <td><div class="w3-container w3-green" style="width:63%">63%</div></td>
    </tr>
  </table>
</div>

</body>
</html>
