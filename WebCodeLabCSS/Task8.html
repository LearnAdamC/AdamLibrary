<!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

<body>

<div class="w3-container">
    <div class="w3-container w3-center">
      <div>
      <img src="img_avatar.png" alt="Avatar" style="width:30%">
      </div>
      <b>UCUP</b>
      <h5>Seorang Manusia Biasa</h5>
    </div>
</div>
    
    <div class="w3-bar w3-black">
      <button class="w3-bar-item w3-button" onclick="openCity('Informasi')">Informasi</button>
      <button class="w3-bar-item w3-button" onclick="openCity('Hobi')">Hobi</button>
      <button class="w3-bar-item w3-button" onclick="openCity('Jadwal')">Jadwal</button>
    </div>

    <div id="Informasi" class="w3-container city">
      <h2>Informasi</h2>
      <p>Nama: Andi</p>
      <p>Umur: 17</p>
      <p>Asal: Jakarta</p>
    </div>

    <div id="Hobi" class="w3-container city" style="display:none">
      <h2>Hobby</h2>
      <p>Coding</p>
      <p>Gaming</p>
      <p>Musik</p>
    </div>

    <div id="Jadwal" class="w3-container city" style="display:none">
      <h2>Time</h2>
      <p>Online: 18:00 - 22:00</p>
      <p>Weekend: Free</p>
    </div>

<script>
function openCity(cityName) {
  var i;
  var x = document.getElementsByClassName("city");
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";  
  }
  document.getElementById(cityName).style.display = "block";  
}
</script>

</body>
</html>
