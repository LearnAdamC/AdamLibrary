<!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<body>

<div class="w3-container">

  <table class="w3-table-all">
    <thead>
      <tr class="w3-blue">
        <th>Number</th>
        <th>Code</th>
      </tr>
    </thead>
    <tr class="w3-hover-grey">
      <td>1</td>
      <td>A</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>2</td>
      <td>B</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>3</td>
      <td>C</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>4</td>
      <td>D</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>5</td>
      <td>E</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>6</td>
      <td>F</td>
    </tr>
    <tr class="w3-hover-grey">
      <td>7</td>
      <td>G</td>
    </tr>
  </table>
</div>

</body>
</html>
