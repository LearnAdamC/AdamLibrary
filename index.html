<!DOCTYPE html>
<html>
<head>
<title>Adam Web Repository</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:linear-gradient(180deg,#0f172a,#020617);
color:white;
}

.container{
width:900px;
margin:auto;
}

/* PROFILE */

.hero{
padding:80px 0;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.profile h1{
font-size:34px;
margin-bottom:10px;
}

.profile p{
color:#9ca3af;
margin:5px 0;
}

/* TITLE */

.section-title{
margin-top:60px;
margin-bottom:25px;
font-size:24px;
text-align:center;
}

/* GRID */

.grid{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

/* CARD */

.card{
background:#111827;
padding:25px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:0.3s;
width:300px;
text-align:center;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(99,102,241,0.5);
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#9ca3af;
font-size:14px;
margin-bottom:10px;
}

.date{
color:#818cf8;
font-size:13px;
margin-bottom:12px;
}

.button{
display:inline-block;
padding:8px 14px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
border-radius:8px;
text-decoration:none;
color:white;
font-size:13px;
}

/* CONTACT */

.contact{
margin-top:80px;
padding:35px;
background:#111827;
border-radius:14px;
text-align:center;
}

.contact p{
color:#9ca3af;
margin-top:6px;
}

/* FOOTER */

.footer{
margin:40px 0;
text-align:center;
color:#6b7280;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<!-- PROFILE -->
<div class="hero">
<div class="profile">
<h1>Adam Chesta Budi</h1>
<p>Teknik Informatika</p>
<p>312310002</p>
</div>
</div>

<!-- TITLE -->
<h2 class="section-title">Tugas Web Coding</h2>

<!-- GRID -->
<div class="grid">

<!-- LAB 03 -->
<div class="card" onclick="location.href='WebCodeLab03/'">
<h3>Web Code Lab 03</h3>
<p>HTML Forms and Media Elements</p>
<div class="date">10 March 2026</div>
<a class="button">Open Lab</a>
</div>

<!-- LAB CSS -->
<div class="card" onclick="location.href='WebCodeLabCSS/'">
<h3>Web Code Lab CSS</h3>
<p>Styling with CSS</p>
<div class="date">30 March 2026</div>
<a class="button">Open Lab</a>
</div>

</div>

<!-- CONTACT -->
<div class="contact">
<p>Email : adamraspberry5@gmail.com</p>
<p>Phone : +6285607711200</p>
</div>

<!-- FOOTER -->
<div class="footer">
Adam Web Repository • 2026
</div>

</div>

</body>
</html>
