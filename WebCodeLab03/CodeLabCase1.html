<!DOCTYPE html>
<html>
    <body>

        <h2>Crate Account</h2>

        <form>

            <input type="text" id="fname" name="fname" placeholder="First Name">
            <input type="text" id="lname" name="lname" placeholder="Last Name"><br><br>

            <select id="country" name="country">
                <option value="" disabled selected>Select Country </option>
                <option value="indonesia">Indonesia</option>
                <option value="japan">Japan</option>
                <option value="Skorea">South Korea</option>
                <option value="china">China</option>
                <option value="other">Other</option>

            </select><br><br>

            <input type="email" id="email" name="email" placeholder="Email Address">
            <input type="text" id="nphone" name="nphone" placeholder="Phone Number"><br><br>

            <input type="password" id="password" name="password" placeholder="Password">
            <input type="password" id="password1" name="password1" placeholder="Confirm Password"><br><br>

            <input type="checkbox" id="kotak" name="kotak">
            <label for="kotak">Terms and Conditions</label><br><br>

            <input type="submit" value="Create">
        </form>

    </body>
</html>
