<!DOCTYPE html>
<html>
    <body>
        
        <h2>Employee Details</h2>

        <form>
            <h4>01. Personal Information</h4>
            <label for="fname">Employee Name</label>
            <input type="text" id="fname" value="" placeholder="First Name">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" value="" placeholder="Last Name"><br><br>

            <label for="startd">Starting Date</label>
            <input type="date" id="startd">
            <label for="birthd">Birth Date</label>
            <input type="date" id="birthd"><br><br>

            <label for="etype">Employee Type</label>
            <select id="etype" name="etype">
                <option value="" disabled selected>Select Type</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <label for="male">Gender</label>
            <input type="radio" id="male" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" value="female">
            <label for="female">Female</label>
            <br><br>

            <label for="position">Position</label>
            <input type="text" id="position" value="" placeholder="Position"><br><br>

            <h4>02. Location</h4>
            <label for="fname">City</label>
            <input type="text" id="city" value="" placeholder="City">
            <label for="fname">State</label>
            <input type="text" id="state" value="" placeholder="State"><br><br>

            <label for="zip">ZIP</label>
            <input type="text" id="zip" placeholder="ZIP">
            <label for="address">Address</label>
            <textarea id="address" placeholder="Address"></textarea><br><br>

            <h4>03. Contact Information</h4>
            <label for="phone">Phone</label>
            <input type="text" id="phone" value="" placeholder="Phone">
            <label for="email">Email</label>
            <input type="email" id="email" value="" placeholder="Email"><br><br>

            <input type="submit" value="Register">
        </form>

    </body>
</html>
